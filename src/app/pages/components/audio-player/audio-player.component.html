<div class="player-bar">

<audio #audioPlayer [src]="currentTrack?.path"></audio>

<div class = "main">
  <div class="top">
    <img class="image" src= {{currentTrack.path}} />
    <div class="track-info">
      <div class="artist">{{currentTrack.artist}} • {{currentTrack.album}}</div>
      <div class="title">{{currentTrack.title}}</div>
    </div>
  </div>
  <div class="progress">
      <span class="time">{{currentTimeText}}</span>
      <input type="range" id="length-slider" min="0" max="{{duration}}" value="{{currentTime}}" step="any" />
      <span class="time">{{durationText}}</span>
    </div>
  <div class="controls">
    <button class="control-button">
      <img src="assets/player-icons/10secBack.svg" class="control-button-10sec-back" />
    </button>
    <button class="control-button">
      <img src="assets/player-icons/shuffle.svg" class="control-button-shuffle" />
    </button>
    <button class="control-button">
      <img src="assets/player-icons/back.svg" class="control-button-back" />
    </button>
    <button class="control-button" (click)="playMusic()">
      <img id="play-button" src="assets/player-icons/play.svg" class="control-button-play" />
    </button>
    <button class="control-button">
      <img src="assets/player-icons/next.svg" class="control-button-next" />
    </button>
    <button class="control-button">
      <img src="assets/player-icons/repeat.svg" class="control-button-repeat" />
    </button>
      <button class="control-button">
      <img src="assets/player-icons/10secForward.svg" class="control-button-10sec-forward" />
    </button>
  </div>
</div>
