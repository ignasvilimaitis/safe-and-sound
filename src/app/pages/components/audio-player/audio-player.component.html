<div class="player-bar">

<audio autoplay #audioPlayer [src]="currentTrack?.path"></audio>

<div class = "main">
  <div class="top">
    <img class="image" src= {{currentTrack.artworkUrl}} />
    <div class="track-info">
      <div class="artist">{{currentTrack.artist}} • {{currentTrack.album}}</div>
      <div class="title">{{currentTrack.title}}</div>
    </div>
  </div>
  <div class="progress">
      <span class="time">{{currentTimeText}}</span>
      <input type="range" (input)="useSlider($event)" class="audio-slider" min="1" [max]="duration || 1" [value]="currentTime" step="any" defaultValue="0" />
      <span class="time">{{durationText}}</span>
    </div>
  <div class="controls">
    <button class="control-button">
      <img src="assets/player-icons/10secBack.svg" (click)="tenSecBack()" class="control-button-10sec-back" />
    </button>
    <button class="control-button">
      <img src="assets/player-icons/shuffle.svg" class="control-button-shuffle" />
    </button>
    <button class="control-button">
      <img src="assets/player-icons/back.svg" class="control-button-back" />
    </button>
    <button class="control-button">
      <img id="play-button" (click)="playMusic()" src="assets/player-icons/play.svg" class="control-button-play" />
    </button>
    <button class="control-button">
      <img src="assets/player-icons/next.svg" class="control-button-next" />
    </button>
    <button class="control-button">
      <img src="assets/player-icons/repeat.svg" class="control-button-repeat" />
    </button>
      <button class="control-button">
      <img src="assets/player-icons/10secForward.svg" (click)= "tenSecForward()" class="control-button-10sec-forward" />
    </button>
  </div>
</div>
